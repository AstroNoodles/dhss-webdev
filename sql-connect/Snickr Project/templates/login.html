<!DOCTYPE html>
<html>

<head>
    <title>Snickr Login Page</title>
    <link href="{{url_for('static', filename='workspace_style.css')}}" rel="stylesheet" />
</head>

<body>
    <h1>Welcome to Snickr</h1>
    <p>The place to chat with your coworkers and colleagues.</p>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-messages">
                    <ul>
                    {% for msg in messages %}
                        <li>{{ msg }}</li>
                    {% endfor %}
                    </ul>
                </div>
            {% endif %}
        {% endwith %}
    <h2>Login Page</h2>
    <div id="login-inputs">
    <form action="{{ url_for('auth.login') }}" method="post">
            <div class="input-combo">
                <label for="username-input">
                    <p>Username:</p>
                </label>
        <input type="text" id="username" name="username">
            </div>
            <div class="input-combo">
                <label for="password-input">
                    <p>Password:</p>
                </label>
        <input type="password" id="password" name="password">
            </div>
            <div class="input-combo"></div>
            <div class="input-combo">
                <input type="submit" class='submit-button' value="Login">
            </div>
        </form>
    </div>

    <div>
        <p>If you do not have a login, please sign up <a href="{{ url_for('auth.signup') }}">here</a></p>
    </div>

</body>

</html>
